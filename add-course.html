<main>
<section>
 <form>
<label for="name">Course Name:</label>
<input title="Fill this field" id="name" type="text" placeholder="Enter course name" required>
<br>
<label for="Dr.name">Instructor:</label>
<input title="Fill this field" id="Dr.name" type="text" placeholder="Enter instructor name" required>
<br>
 <label for="hours">Credit Hours:</label>
  <input title="Fill this field" id="hours" type="number" min="2" max="3" required placeholder="Enter the number of Credit Hours ">
<br>
<label for="notes">Notes:</label>
<textarea title="Fill this field" id="notes" placeholder="Enter your Notes"></textarea>
<br>
 <button type="submit">Save Course</button>
 </form>
 </section>
